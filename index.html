<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特許法 脳トレ・フラッシュトレーナー (第1章・第2章特化版)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ADB5">
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="特許法トレーナー">
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #777777;
            --accent-color: #00ADB5;
            --correct-color: #00ffcc;
            --wrong-color: #ff4d4d;
            --choice-bg: #2a2a2a;
            --choice-hover: #3a3a3a;
            --flash-bg: rgba(0, 173, 181, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左側：サイドバー */
        #sidebar {
            width: 340px;
            background-color: var(--panel-bg);
            border-right: 1px solid #2d2d2d;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        h2 {
            font-size: 0.95rem;
            margin-top: 0;
            border-left: 3px solid var(--accent-color);
            padding-left: 8px;
            margin-bottom: 12px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-block {
            margin-bottom: 25px;
        }

        .control-toggle {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            user-select: none;
        }

        .control-toggle input {
            margin-right: 10px;
        }

        /* モード切り替えスタイル */
        .mode-selector {
            display: flex;
            background: #121212;
            border-radius: 6px;
            padding: 2px;
            margin-bottom: 15px;
        }

        .mode-btn {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            font-weight: bold;
            color: var(--text-muted);
        }

        .mode-btn.active {
            background-color: var(--accent-color);
            color: #fff;
        }

        #minimap-container {
            flex-grow: 1;
        }

        .minimap-chapter {
            margin-bottom: 15px;
        }

        .minimap-chapter-title {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 6px;
        }

        .minimap-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }

        .minimap-item {
            font-size: 0.7rem;
            background: #151515;
            padding: 5px 2px;
            text-align: center;
            border-radius: 3px;
            color: var(--text-muted);
            transition: all 0.15s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid transparent;
        }

        .minimap-item.active {
            color: #aaa;
            border-color: #333;
            cursor: pointer;
        }

        .minimap-item.focused {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background-color: rgba(0, 173, 181, 0.15);
        }

        .minimap-item.correct {
            background-color: #fff !important;
            color: #000 !important;
            font-weight: bold;
            box-shadow: 0 0 8px rgba(255,255,255,0.7);
        }

        /* 右側：メインパネル */
        #main-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        #quiz-box {
            max-width: 600px;
            width: 100%;
            background: var(--panel-bg);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        #question-display {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 0.5px;
        }

        #summary-display {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #b0b0b0;
            background: #151515;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            text-align: left;
            border-left: 3px solid #444;
        }

        #choices-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
        }

        .choice-btn {
            background-color: var(--choice-bg);
            border: 1px solid #3e3e3e;
            color: #fff;
            font-size: 1.05rem;
            padding: 16px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.1s ease;
            outline: none;
        }

        .choice-btn:hover {
            background-color: var(--choice-hover);
            border-color: #555;
        }

        .choice-btn.correct {
            background-color: #fff !important;
            border-color: #fff !important;
            color: #000 !important;
            font-weight: bold;
        }

        .choice-btn.wrong {
            background-color: transparent !important;
            border-color: var(--wrong-color) !important;
            color: var(--wrong-color) !important;
            opacity: 0.4;
        }

        /* 5秒フラッシュオーバーレイ */
        #flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--flash-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease-in-out;
        }

        #flash-overlay.show {
            opacity: 1;
        }

        #flash-alias {
            font-size: 1.2rem;
            font-weight: bold;
            color: #000;
            background: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        #flash-note {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.4;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        #toast {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--accent-color);
            color: #fff;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #2d2d2d; }
            #main-panel { padding: 15px 5px; }
            #choices-area { grid-template-columns: 1fr; }
            #flash-note { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="control-block">
            <h2>学習モード</h2>
            <div class="mode-selector">
                <div id="mode-alias-btn" class="mode-btn active" onclick="setMode('BY_ALIAS')">通称 ➔ 条文番号</div>
                <div id="mode-article-btn" class="mode-btn" onclick="setMode('BY_ARTICLE')">条文番号 ➔ 通称</div>
            </div>
        </div>

        <div class="control-block">
            <h2>章 フィルター</h2>
            <div id="chapter-filter-container"></div>
        </div>

        <div class="control-block">
            <h2>重点登録</h2>
            <label class="control-toggle"><input type="checkbox" id="focus-mode-toggle"> 登録した条文だけ出題する</label>
            <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px;">ミニマップの条文名をタップで登録/解除</div>
        </div>

        <div class="control-block">
            <h2>表示設定</h2>
            <label class="control-toggle"><input type="checkbox" id="summary-toggle" checked> 条文のまとめ文を表示</label>
        </div>

        <div class="control-block">
            <h2>利用時間</h2>
            <div id="today-time-display" style="font-size: 1.3rem; font-weight: bold; color: #fff; margin-bottom: 8px;">0.0分</div>
            <div style="font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px;">直近の履歴</div>
            <div id="time-history-list" style="font-size: 0.75rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 10px;"></div>
            <button id="export-log-btn" style="width: 100%; padding: 8px; background: var(--accent-color); border: none; border-radius: 4px; color: #fff; font-size: 0.8rem; font-weight: bold; cursor: pointer;">ログをダウンロード(.md)</button>
        </div>
        
        <h2>条文ミニマップ</h2>
        <div id="minimap-container"></div>
    </div>

    <div id="main-panel">
        <div id="toast">🎉 クリア！</div>
        
        <div id="quiz-box">
            <div id="flash-overlay">
                <div id="flash-alias">通称</div>
                <div id="flash-note">使われ方フラッシュ</div>
            </div>

            <div id="question-display">Loading...</div>
            <div id="summary-display">条文の解説がここに表示されます。</div>
            
            <div id="choices-area">
                <button class="choice-btn" data-index="0">--</button>
                <button class="choice-btn" data-index="1">--</button>
                <button class="choice-btn" data-index="2">--</button>
                <button class="choice-btn" data-index="3">--</button>
            </div>
        </div>
    </div>

    <script>
        // 音声フィードバック（Web Audio API）
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(800, now + 0.05);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'wrong') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(180, now);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        function formatArticleName(artStr) {
            const str = String(artStr);
            if (str.includes('_')) {
                const parts = str.split('_');
                return `${parts[0]}条の${parts[1]}`;
            }
            return `${str}条`;
        }

        let patentLawData = []; // 外部JSONから読み込む
        let currentMode = "BY_ALIAS";
        let activeChapters = new Set(); // initGame()内でデータから動的に決定される
        let correctArticles = new Set();
        let focusedArticles = new Set(JSON.parse(localStorage.getItem('focusedArticles') || '[]'));
        let focusModeOnly = false;
        let currentQuestion = null;
        let questionQueue = [];
        let wrongAttempted = false;
        let showSummary = true;

        function saveFocusedArticles() {
            localStorage.setItem('focusedArticles', JSON.stringify([...focusedArticles]));
        }

        // ===== 表示設定の永続化（章フィルター・重点登録モード・まとめ文表示） =====
        function saveUiSettings() {
            localStorage.setItem('uiSettings', JSON.stringify({
                activeChapters: [...activeChapters],
                knownChapters: [...new Set(patentLawData.map(d => d.chapter))],
                focusModeOnly: focusModeOnly,
                showSummary: showSummary
            }));
        }

        function loadUiSettings() {
            try {
                const raw = localStorage.getItem('uiSettings');
                if (!raw) return null;
                return JSON.parse(raw);
            } catch (e) {
                return null;
            }
        }

        // UI要素
        const questionDisplay = document.getElementById('question-display');
        const summaryDisplay = document.getElementById('summary-display');
        const choicesArea = document.getElementById('choices-area');
        const choiceBtns = document.querySelectorAll('.choice-btn');
        const minimapContainer = document.getElementById('minimap-container');
        const toast = document.getElementById('toast');
        const summaryToggle = document.getElementById('summary-toggle');
        const flashOverlay = document.getElementById('flash-overlay');
        const flashAlias = document.getElementById('flash-alias');
        const flashNote = document.getElementById('flash-note');

        // 外部JSONデータの読み込み
        async function loadData() {
            try {
                const response = await fetch('patent_data.json');
                if (!response.ok) throw new Error('JSONの読み込みに失敗しました');
                patentLawData = await response.json();
                initGame();
            } catch (error) {
                questionDisplay.innerText = "データ読み込みエラー";
                summaryDisplay.innerText = "同じフォルダに 'patent_data.json' が正しく配置されているか確認してください。";
                choicesArea.style.display = 'none';
                console.error(error);
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-alias-btn').classList.toggle('active', mode === 'BY_ALIAS');
            document.getElementById('mode-article-btn').classList.toggle('active', mode === 'BY_ARTICLE');
            generateQueue();
            nextQuestion();
        }

        function renderChapterFilter() {
            const container = document.getElementById('chapter-filter-container');
            container.innerHTML = '';
            const chapters = [...new Set(patentLawData.map(d => d.chapter))].sort((a, b) => a - b);
            chapters.forEach(ch => {
                const chName = patentLawData.find(d => d.chapter === ch).chapterName;
                const label = document.createElement('label');
                label.className = 'control-toggle';
                const input = document.createElement('input');
                input.type = 'checkbox';
                input.checked = activeChapters.has(ch);
                input.addEventListener('change', (e) => {
                    if (e.target.checked) activeChapters.add(ch); else activeChapters.delete(ch);
                    saveUiSettings();
                    renderMinimap(); generateQueue(); nextQuestion();
                });
                label.appendChild(input);
                label.appendChild(document.createTextNode(' ' + chName));
                container.appendChild(label);
            });
        }

        function initGame() {
            // 章フィルターの初期状態を決める（データにある章 × 保存済みの設定）
            const allChapters = [...new Set(patentLawData.map(d => d.chapter))].sort((a, b) => a - b);
            const saved = loadUiSettings();
            if (saved && Array.isArray(saved.activeChapters)) {
                const savedActive = new Set(saved.activeChapters);
                const knownBefore = new Set(saved.knownChapters || saved.activeChapters);
                // 既知の章は保存状態を踏襲、前回保存時になかった新しい章はデフォルトON
                activeChapters = new Set(allChapters.filter(ch => knownBefore.has(ch) ? savedActive.has(ch) : true));
            } else {
                activeChapters = new Set(allChapters);
            }

            if (saved && typeof saved.focusModeOnly === 'boolean') {
                focusModeOnly = saved.focusModeOnly;
                document.getElementById('focus-mode-toggle').checked = focusModeOnly;
            }
            if (saved && typeof saved.showSummary === 'boolean') {
                showSummary = saved.showSummary;
                summaryToggle.checked = showSummary;
                summaryDisplay.style.display = showSummary ? 'block' : 'none';
            }

            renderChapterFilter();
            renderMinimap();
            generateQueue();
            nextQuestion();

            document.getElementById('focus-mode-toggle').addEventListener('change', (e) => {
                focusModeOnly = e.target.checked;
                saveUiSettings();
                generateQueue(); nextQuestion();
            });

            // 表示設定のイベント
            summaryToggle.addEventListener('change', (e) => {
                showSummary = e.target.checked;
                summaryDisplay.style.display = showSummary ? 'block' : 'none';
                saveUiSettings();
            });

            // 選択肢ボタンのイベント
            choiceBtns.forEach(btn => {
                btn.addEventListener('click', () => checkAnswer(btn));
            });
        }

        function renderMinimap() {
            minimapContainer.innerHTML = '';
            const chapters = [...new Set(patentLawData.map(d => d.chapter))].sort((a, b) => a - b);
            chapters.forEach(ch => {
                if (!activeChapters.has(ch)) return;
                const chData = patentLawData.filter(d => d.chapter === ch);
                const chBox = document.createElement('div');
                chBox.className = 'minimap-chapter';
                chBox.appendChild(Object.assign(document.createElement('div'), {
                    className: 'minimap-chapter-title', 
                    innerText: chData[0].chapterName
                }));
                
                const list = document.createElement('div');
                list.className = 'minimap-list';
                
                chData.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'minimap-item active';
                    el.id = `map-art-${item.article}`;
                    el.innerText = formatArticleName(item.article);
                    if (focusedArticles.has(item.article)) el.classList.add('focused');
                    if (correctArticles.has(item.article)) el.classList.add('correct');
                    el.addEventListener('click', () => {
                        if (focusedArticles.has(item.article)) {
                            focusedArticles.delete(item.article);
                            el.classList.remove('focused');
                        } else {
                            focusedArticles.add(item.article);
                            el.classList.add('focused');
                        }
                        saveFocusedArticles();
                        if (focusModeOnly) { generateQueue(); }
                    });
                    list.appendChild(el);
                });
                chBox.appendChild(list);
                minimapContainer.appendChild(chBox);
            });
        }

        function generateQueue() {
            const availableData = patentLawData.filter(d =>
                activeChapters.has(d.chapter) &&
                !correctArticles.has(d.article) &&
                (!focusModeOnly || focusedArticles.has(d.article))
            );
            // シャッフル
            for (let i = availableData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availableData[i], availableData[j]] = [availableData[j], availableData[i]];
            }
            questionQueue = availableData;
        }

        function nextQuestion() {
            wrongAttempted = false;
            choiceBtns.forEach(btn => { btn.className = 'choice-btn'; btn.disabled = false; });
            flashOverlay.classList.remove('show');

            if (activeChapters.size === 0) {
                questionDisplay.innerText = "章を選択してください。";
                summaryDisplay.innerText = "";
                choicesArea.style.display = 'none';
                return;
            }

            if (focusModeOnly && focusedArticles.size === 0) {
                questionDisplay.innerText = "重点条文が登録されていません。";
                summaryDisplay.innerText = "ミニマップの条文名をタップして登録してください。";
                choicesArea.style.display = 'none';
                return;
            }

            if (questionQueue.length === 0) {
                generateQueue();
                if (questionQueue.length === 0) {
                    questionDisplay.innerText = "すべての条文をクリアしました！";
                    summaryDisplay.innerText = "フィルターを再確認するか、リロードしてください。";
                    choicesArea.style.display = 'none';
                    return;
                }
            }

            choicesArea.style.display = 'grid';
            currentQuestion = questionQueue.shift();

            // モードに応じた問題文の表示
            if (currentMode === "BY_ALIAS") {
                questionDisplay.innerText = currentQuestion.alias;
            } else {
                questionDisplay.innerText = formatArticleName(currentQuestion.article);
            }

            summaryDisplay.innerText = currentQuestion.summary;
            summaryDisplay.style.display = showSummary ? 'block' : 'none';

            renderChoices();
        }

        function renderChoices() {
            const isAliasMode = (currentMode === "BY_ALIAS");
            const correctVal = isAliasMode ? currentQuestion.article : currentQuestion.alias;
            
            // ダミー選択肢のプール作成（章フィルターと連動させる）
            let dummyPool = patentLawData
                .filter(d => d.article !== currentQuestion.article && activeChapters.has(d.chapter))
                .map(d => isAliasMode ? d.article : d.alias);
            
            // 重複排除
            dummyPool = [...new Set(dummyPool)];
            
            // ランダムに3つ抽出
            for (let i = dummyPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [dummyPool[i], dummyPool[j]] = [dummyPool[j], dummyPool[i]];
            }
            const chosenDummies = dummyPool.slice(0, 3);
            
            // 正解を混ぜてシャッフル
            let finalChoices = [correctVal, ...chosenDummies];
            for (let i = finalChoices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [finalChoices[i], finalChoices[j]] = [finalChoices[j], finalChoices[i]];
            }

            // ボタンへ割り当て
            choiceBtns.forEach((btn, index) => {
                const val = finalChoices[index];
                btn.innerText = isAliasMode ? formatArticleName(val) : val;
                btn.dataset.value = val;
            });
        }

        function checkAnswer(selectedBtn) {
            if (!currentQuestion) return;
            const isAliasMode = (currentMode === "BY_ALIAS");
            const selectedVal = selectedBtn.dataset.value;
            const correctVal = isAliasMode ? currentQuestion.article : currentQuestion.alias;
            
            if (selectedVal === correctVal) {
                selectedBtn.classList.add('correct');
                playSound('correct');
                
                // ミニマップの進行度更新
                if (!wrongAttempted) {
                    correctArticles.add(currentQuestion.article);
                    const mapItem = document.getElementById(`map-art-${currentQuestion.article}`);
                    if (mapItem) mapItem.classList.add('correct');
                } else {
                    // 間違えていた場合はキューに戻す
                    questionQueue.push(currentQuestion);
                }

                // フラッシュと解説は summary を共用
                flashAlias.innerText = currentQuestion.alias;
                flashNote.innerText = currentQuestion.summary || "補足情報なし";
                flashOverlay.classList.add('show');

                // 0秒後に自動で次の問題へ
                setTimeout(nextQuestion, 100);

            } else {
                wrongAttempted = true;
                selectedBtn.classList.add('wrong');
                selectedBtn.disabled = true;
                playSound('wrong');
            }
        }

        // ===== 利用時間トラッキング =====
        function todayKey(d = new Date()) {
            const tz = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - tz).toISOString().slice(0, 10);
        }

        function addElapsedTime(ms) {
            const key = 'studyTime_' + todayKey();
            const prev = parseInt(localStorage.getItem(key) || '0', 10);
            localStorage.setItem(key, String(prev + ms));
        }

        function getMinutesForDate(dateStr) {
            const ms = parseInt(localStorage.getItem('studyTime_' + dateStr) || '0', 10);
            return ms / 60000;
        }

        let trackingStart = null;

        function isPageActive() {
            return !document.hidden && document.hasFocus();
        }

        function startTracking() {
            if (trackingStart === null) trackingStart = Date.now();
        }

        function stopTracking() {
            if (trackingStart !== null) {
                addElapsedTime(Date.now() - trackingStart);
                trackingStart = null;
            }
        }

        function updateTimeDisplay() {
            const todayMs = parseInt(localStorage.getItem('studyTime_' + todayKey()) || '0', 10);
            const liveMs = trackingStart !== null ? (Date.now() - trackingStart) : 0;
            const totalMin = (todayMs + liveMs) / 60000;
            const display = document.getElementById('today-time-display');
            if (display) display.innerText = `${totalMin.toFixed(1)}分`;
        }

        function renderTimeHistory() {
            const list = document.getElementById('time-history-list');
            if (!list) return;
            list.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const mins = getMinutesForDate(todayKey(d));
                const row = document.createElement('div');
                row.innerText = `${d.getMonth() + 1}/${d.getDate()}: ${mins.toFixed(1)}分`;
                list.appendChild(row);
            }
        }

        function getMondayOfWeek(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            const day = d.getDay(); // 0=日, 1=月, ...
            const diff = (day === 0 ? -6 : 1 - day);
            d.setDate(d.getDate() + diff);
            return todayKey(d);
        }

        function exportTimeLogAsMarkdown() {
            const entries = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('studyTime_')) {
                    const dateStr = key.slice('studyTime_'.length);
                    const ms = parseInt(localStorage.getItem(key) || '0', 10);
                    entries.push({ date: dateStr, minutes: ms / 60000 });
                }
            }

            if (entries.length === 0) {
                alert('まだ記録がありません。');
                return;
            }

            entries.sort((a, b) => a.date.localeCompare(b.date));

            const weekTotals = new Map();
            const monthTotals = new Map();
            entries.forEach(({ date, minutes }) => {
                const monday = getMondayOfWeek(date);
                weekTotals.set(monday, (weekTotals.get(monday) || 0) + minutes);
                const month = date.slice(0, 7);
                monthTotals.set(month, (monthTotals.get(month) || 0) + minutes);
            });

            const totalMinutes = entries.reduce((sum, e) => sum + e.minutes, 0);

            let md = `# 特許法トレーナー 学習時間ログ\n\n`;
            md += `エクスポート日時: ${new Date().toLocaleString('ja-JP')}\n\n`;
            md += `合計学習時間: ${totalMinutes.toFixed(1)}分（${entries.length}日分）\n\n`;

            md += `## 月別\n\n| 月 | 分 |\n|---|---|\n`;
            [...monthTotals.entries()].sort((a, b) => a[0].localeCompare(b[0])).forEach(([month, mins]) => {
                md += `| ${month} | ${mins.toFixed(1)} |\n`;
            });

            md += `\n## 週別（月曜始まり）\n\n| 週開始日 | 分 |\n|---|---|\n`;
            [...weekTotals.entries()].sort((a, b) => a[0].localeCompare(b[0])).forEach(([week, mins]) => {
                md += `| ${week} | ${mins.toFixed(1)} |\n`;
            });

            md += `\n## 日別\n\n| 日付 | 分 |\n|---|---|\n`;
            entries.forEach(({ date, minutes }) => {
                md += `| ${date} | ${minutes.toFixed(1)} |\n`;
            });

            const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `studytime_log_${todayKey()}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // タブ切り替え・ウィンドウのフォーカス変化を検知して計測をON/OFF
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) stopTracking();
            else if (isPageActive()) startTracking();
        });
        window.addEventListener('focus', () => { if (!document.hidden) startTracking(); });
        window.addEventListener('blur', stopTracking);
        window.addEventListener('pagehide', stopTracking);
        window.addEventListener('beforeunload', stopTracking);

        // 5秒ごとに保存・表示を更新（強制終了時のデータ消失を防ぐ）
        setInterval(() => {
            if (trackingStart !== null) {
                stopTracking();
                startTracking();
            }
            updateTimeDisplay();
            renderTimeHistory();
        }, 5000);

        if (isPageActive()) startTracking();
        updateTimeDisplay();
        renderTimeHistory();

        const exportBtn = document.getElementById('export-log-btn');
        if (exportBtn) exportBtn.addEventListener('click', exportTimeLogAsMarkdown);

        // ===== Service Worker 登録（インストール可能化・オフライン対応） =====
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(console.error);
            });
        }

        // 起動時にロードを開始
        window.onload = loadData;
    </script>
</body>
</html>
